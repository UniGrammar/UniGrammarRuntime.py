[metadata]
name = UniGrammarRuntime
#version = 0.1
author = KOLANICH
url = https://gitlab.com/UniGrammar/UniGrammarRuntime.py
description = The runtime for UniGrammar. Needed for auto-generated wrappers. May be needed for handcrafted wrappers.
long_description = file: ReadMe.md
keywords = grammars, UniGrammar, ANTLR, CoCo/R, parglare, waxeye, TatSu, parsimonious, YAML
license = Unlicense
classifiers =
	Programming Language :: Python
	Programming Language :: Python :: 3
	Development Status :: 4 - Beta
	Environment :: Other Environment
	Intended Audience :: Developers
	License :: Public Domain
	License :: Public Domain :: Unlicense
	Operating System :: OS Independent
	Topic :: Software Development :: Libraries :: Python Modules
	Topic :: Security
	Topic :: Text Processing

[options]
python_requires = >=3.4
install_requires =
	UniGrammarRuntimeCore @ git+https://gitlab.com/UniGrammar/UniGrammarRuntimeCore.py
	urm @ git+https://gitlab.com/KOLANICH/urm.py
	transformerz @ git+https://gitlab.com/KOLANICH/transformerz.py
zip_safe = True
include_package_data = True
packages = find:
setup_requires = setuptools>=44; wheel; setuptools_scm[toml]>=3.4.3
